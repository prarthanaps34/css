<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crochet Flower Bouquet</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background-color: #f8f8f8;
        margin: 0;
        padding: 20px;
    }

    .product-card{
        width: 320px;
        margin: 40px auto;
        background-color: white;
        border: 2px solid #ddd;
        border-radius: 10px;
        text-align: center;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }


    .product-img{
        width: 250px;
        height: 250px;
        border: 2px solid black;
        border-top-left-radius: 30px;
        border-bottom-right-radius: 30px;
        
    }

    h2{
        color: #b22222;
        font-size: 28px;
    }

    p{
        font-size: 18px;
        color: #555;
    }

    button{
        background-color: #ff69b4;
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover{
        background-color: #e75480;
    }


    @media (max-width:600px){

        .product-card{
            width: 90%;
            text-align: center;
            background-color: lightblue;
        }

        h2{
            font-size: 22px;
        }

        p{
            font-size: 15px;
        }

        button{
            font-size: 15px;
        }
    }
    @media (orientation:landscape){

        .product-card{
            background-color: lightblue;
        }

    }

</style>

</head>
<body>

<div class="product-card">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRe9YNOoguLYsfNLbPtlAWhdQl9igRLlJq5ITK7wTrrdK9d9crEakJDLAS7&s=10"
         alt="Crochet Flower Bouquet"
         class="product-img">

    <h2>Handmade Crochet Flower Bouquet</h2>

    <p>
        A beautiful handmade crochet flower bouquet crafted with soft yarn.
        Perfect for birthdays, anniversaries, weddings, graduations, and
        special occasions. A thoughtful gift that stays beautiful forever.
    </p>

    <button>Buy Now</button>

</div>
  
</body>
</html>
